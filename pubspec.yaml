name: rdv_flutter
description: RDV - Relatório de Despesas de Viagens

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado e persistência
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0

  # Câmera e imagem
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image_cropper: ^7.0.3

  # OCR - Google ML Kit (offline)
  google_mlkit_text_recognition: ^0.13.0

  # Geração de PDF
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2

  # UI
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  cupertino_icons: ^1.0.6
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo_amp.jpg
